name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: '部署目標：preview = github.io 草稿預覽；production = 自訂網域上線'
        type: choice
        options:
          - preview
          - production
        default: preview

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        # postbuild script runs pagefind automatically (see package.json)
        # 目標解析優先序：
        #   1. workflow_dispatch 手選的 deploy_target
        #   2. repo 變數 vars.DEPLOY_TARGET（買網址後設成 'production' = 唯一要改的那個參數）
        #   3. 預設 'preview'（github.io 草稿、無 CNAME）—— 買網址前的安全預設
        env:
          DEPLOY_TARGET: ${{ github.event.inputs.deploy_target || vars.DEPLOY_TARGET || 'preview' }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
